    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, Serif;
            background: linear-gradient(to right, #3a007d, #12005e);
            color: #fff;
            line-height: 1.6;
        }

        header, footer {
            text-align: center;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
            padding: 1rem;
        }

        header h1 {
            margin-bottom: 0.5rem;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            background: #12005e;
            padding: 1rem;
        }

        nav ul li {
            margin: 0 1rem;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        section {
            margin: 2rem auto;
            max-width: 1200px;
            padding: 1rem;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            border-radius: 10px;
        }

        .gallery, .video-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            justify-content: center;
            align-items: center;
        }

        .thumbnail {
            height: 200px;
            width: 100%;
            object-fit: cover;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .thumbnail:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.6);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 80%;
            max-height: 80%;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2rem;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>

    <div id="modal" class="modal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modal-content" class="modal-content">
        <video id="modal-video" class="modal-content" controls style="display: none;"></video>
    </div>

    <script>
        function openModal(contentSrc) {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-content');
            const modalVideo = document.getElementById('modal-video');

            modal.style.display = 'flex';

            if (contentSrc.endsWith('.mp4')) {
                modalVideo.style.display = 'block';
                modalImg.style.display = 'none';
                modalVideo.src = contentSrc;
            } else {
                modalImg.style.display = 'block';
                modalVideo.style.display = 'none';
                modalImg.src = contentSrc;
            }
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modal-content');
            const modalVideo = document.getElementById('modal-video');

            modal.style.display = 'none';
            modalImg.src = '';
            modalVideo.src = '';
        }
    </script>
